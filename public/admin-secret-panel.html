<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Crichton Cottage - Admin Panel</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', sans-serif;
            background: linear-gradient(135deg, #1a4332 0%, #0b2817 50%, #1a4332 100%);
            color: #2d3436;
            min-height: 100vh;
            padding: 16px;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
        }

        header {
            background: linear-gradient(135deg, rgba(255,255,255,0.95) 0%, rgba(255,255,255,0.85) 100%);
            backdrop-filter: blur(10px);
            padding: 24px;
            border-radius: 16px;
            margin-bottom: 24px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.1);
            border: 1px solid rgba(255,255,255,0.2);
        }

        h1 {
            color: #1a4332;
            margin-bottom: 4px;
            font-size: 28px;
            font-weight: 700;
        }

        header p {
            color: #666 !important;
            font-size: 13px !important;
        }

        .tabs {
            display: flex;
            gap: 8px;
            margin-bottom: 24px;
            background: rgba(255,255,255,0.95);
            backdrop-filter: blur(10px);
            padding: 12px;
            border-radius: 16px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.1);
            border: 1px solid rgba(255,255,255,0.2);
            overflow-x: auto;
        }

        .tab-btn {
            padding: 10px 16px;
            background: #f5f5f5;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            font-weight: 600;
            font-size: 13px;
            transition: all 0.3s ease;
            white-space: nowrap;
            color: #666;
        }

        .tab-btn:hover {
            background: #e8e8e8;
        }

        .tab-btn.active {
            background: linear-gradient(135deg, #c9a84c 0%, #a68a3e 100%);
            color: white;
            box-shadow: 0 4px 15px rgba(201, 168, 76, 0.3);
        }

        .tab-content {
            display: none;
            animation: fadeIn 0.3s ease;
        }

        .tab-content.active {
            display: block;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 16px;
            margin-bottom: 24px;
        }

        .stat-card {
            background: linear-gradient(135deg, rgba(255,255,255,0.95) 0%, rgba(255,255,255,0.85) 100%);
            backdrop-filter: blur(10px);
            padding: 20px;
            border-radius: 16px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.1);
            text-align: center;
            border: 1px solid rgba(255,255,255,0.2);
            transition: all 0.3s ease;
        }

        .stat-card:hover {
            transform: translateY(-4px);
            box-shadow: 0 12px 40px rgba(0, 0, 0, 0.15);
        }

        .stat-label {
            color: #666;
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 0.7px;
            margin-bottom: 8px;
            font-weight: 600;
        }

        .stat-value {
            font-size: 32px;
            font-weight: 700;
            color: #c9a84c;
        }

        .form-group {
            background: linear-gradient(135deg, rgba(255,255,255,0.95) 0%, rgba(255,255,255,0.85) 100%);
            backdrop-filter: blur(10px);
            padding: 28px;
            border-radius: 16px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.1);
            margin-bottom: 24px;
            border: 1px solid rgba(255,255,255,0.2);
        }

        .form-group h2 {
            color: #1a4332;
            font-size: 20px;
            margin-bottom: 20px !important;
        }

        .form-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 16px;
        }

        label {
            display: block;
            color: #2d3436;
            font-weight: 600;
            margin-bottom: 8px;
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        input, select {
            width: 100%;
            padding: 12px 14px;
            border: 1.5px solid #e0e0e0;
            border-radius: 10px;
            font-size: 14px;
            font-family: inherit;
            transition: all 0.3s ease;
            background: white;
        }

        input:focus, select:focus {
            outline: none;
            border-color: #c9a84c;
            box-shadow: 0 0 0 3px rgba(201, 168, 76, 0.1);
            background: #fffaf5;
        }

        .btn-submit {
            padding: 12px 28px;
            background: linear-gradient(135deg, #c9a84c 0%, #a68a3e 100%);
            color: white;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            font-weight: 600;
            font-size: 14px;
            transition: all 0.3s ease;
            grid-column: 1 / -1;
            box-shadow: 0 4px 15px rgba(201, 168, 76, 0.2);
        }

        .btn-submit:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(201, 168, 76, 0.3);
        }

        .btn-submit:active {
            transform: translateY(0);
        }

        .table-wrapper {
            background: linear-gradient(135deg, rgba(255,255,255,0.95) 0%, rgba(255,255,255,0.85) 100%);
            backdrop-filter: blur(10px);
            border-radius: 16px;
            overflow: hidden;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.1);
            margin-bottom: 24px;
            border: 1px solid rgba(255,255,255,0.2);
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        thead {
            background: #1a4332;
            color: white;
        }

        th {
            padding: 14px;
            text-align: left;
            font-weight: 600;
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 0.7px;
        }

        td {
            padding: 14px;
            border-bottom: 1px solid #f0f0f0;
            font-size: 14px;
        }

        tr:hover {
            background: #f8f8f8;
        }

        .room-badge {
            display: inline-block;
            padding: 6px 12px;
            background: linear-gradient(135deg, #e8f5e9 0%, #c8e6c9 100%);
            color: #2e7d32;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 600;
            border: 1px solid #a5d6a7;
        }

        .btn-delete {
            padding: 6px 12px;
            background: linear-gradient(135deg, #ef5350 0%, #e53935 100%);
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 12px;
            font-weight: 600;
            transition: all 0.3s ease;
        }

        .btn-delete:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(239, 83, 80, 0.3);
        }

        .alert {
            padding: 14px 16px;
            border-radius: 12px;
            margin-bottom: 20px;
            display: none;
            animation: slideDown 0.3s ease;
            border-left: 4px solid transparent;
        }

        @keyframes slideDown {
            from {
                opacity: 0;
                transform: translateY(-10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .alert.success {
            background: linear-gradient(135deg, #e8f5e9 0%, #c8e6c9 100%);
            color: #2e7d32;
            border-left-color: #2e7d32;
            display: block;
        }

        .alert.error {
            background: linear-gradient(135deg, #ffebee 0%, #ffcdd2 100%);
            color: #c62828;
            border-left-color: #c62828;
            display: block;
        }

        .no-data {
            text-align: center;
            padding: 48px 20px;
            color: #999;
            font-size: 14px;
        }

        .refresh-btn-container {
            margin-bottom: 20px;
        }

        .refresh-btn-container .btn-submit {
            width: auto;
            grid-column: auto;
        }

        /* Mobile Responsive Design */
        @media (max-width: 768px) {
            body {
                padding: 12px;
            }

            header {
                padding: 16px;
                margin-bottom: 16px;
            }

            h1 {
                font-size: 22px;
            }

            .tabs {
                gap: 6px;
                padding: 10px;
                margin-bottom: 16px;
            }

            .tab-btn {
                padding: 8px 12px;
                font-size: 12px;
            }

            .stats-grid {
                grid-template-columns: repeat(auto-fit, minmax(120px, 1fr));
                gap: 12px;
                margin-bottom: 16px;
            }

            .stat-card {
                padding: 16px;
            }

            .stat-label {
                font-size: 10px;
            }

            .stat-value {
                font-size: 24px;
            }

            .form-group {
                padding: 16px;
                margin-bottom: 16px;
            }

            .form-group h2 {
                font-size: 16px;
                margin-bottom: 16px !important;
            }

            .form-grid {
                grid-template-columns: 1fr;
                gap: 12px;
            }

            .form-grid > div {
                width: 100%;
            }

            label {
                font-size: 11px;
            }

            input, select {
                padding: 10px 12px;
                font-size: 14px;
            }

            .btn-submit {
                padding: 11px 24px;
                font-size: 13px;
                grid-column: 1 / -1;
            }

            .table-wrapper {
                margin-bottom: 16px;
                border-radius: 12px;
            }

            table {
                font-size: 13px;
            }

            thead {
                display: none;
            }

            tr {
                display: block;
                margin-bottom: 12px;
                border: 1px solid #e0e0e0;
                border-radius: 10px;
                overflow: hidden;
                background: white;
            }

            td {
                display: block;
                padding: 10px 12px;
                border-bottom: 1px solid #f0f0f0;
                text-align: left;
                font-size: 13px;
            }

            td:last-child {
                border-bottom: none;
            }

            td::before {
                content: attr(data-label);
                font-weight: 600;
                color: #1a4332;
                display: block;
                font-size: 11px;
                text-transform: uppercase;
                margin-bottom: 4px;
                letter-spacing: 0.5px;
            }

            .room-badge {
                padding: 4px 10px;
                font-size: 11px;
            }

            .btn-delete {
                padding: 8px 12px;
                font-size: 12px;
                width: 100%;
            }

            .alert {
                font-size: 13px;
                padding: 12px 14px;
            }

            .no-data {
                padding: 32px 16px;
                font-size: 13px;
            }
        }

        @media (max-width: 480px) {
            .stats-grid {
                grid-template-columns: 1fr;
            }

            .stat-card {
                padding: 14px;
            }

            .stat-value {
                font-size: 20px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>🏠 Crichton Cottage Admin Panel</h1>
            <p style="color: #666; font-size: 14px;">Manage bookings and view statistics</p>
        </header>

        <div id="successAlert" class="alert"></div>
        <div id="errorAlert" class="alert"></div>

        <div class="tabs">
            <button class="tab-btn active" onclick="switchTab('dashboard')">📊 Dashboard</button>
            <button class="tab-btn" onclick="switchTab('bookings')">📅 Bookings</button>
            <button class="tab-btn" onclick="switchTab('add')">➕ Add</button>
        </div>

        <!-- Dashboard Tab -->
        <div id="dashboard" class="tab-content active">
            <div class="stats-grid" id="statsGrid">
                <div class="stat-card">
                    <div class="stat-label">Total Bookings</div>
                    <div class="stat-value">-</div>
                </div>
                <div class="stat-card">
                    <div class="stat-label">Sanyati</div>
                    <div class="stat-value">-</div>
                </div>
                <div class="stat-card">
                    <div class="stat-label">Pungwe</div>
                    <div class="stat-value">-</div>
                </div>
                <div class="stat-card">
                    <div class="stat-label">Odzi</div>
                    <div class="stat-value">-</div>
                </div>
                <div class="stat-card">
                    <div class="stat-label">Gwayi</div>
                    <div class="stat-value">-</div>
                </div>
                <div class="stat-card">
                    <div class="stat-label">Self Catering</div>
                    <div class="stat-value">-</div>
                </div>
                <div class="stat-card">
                    <div class="stat-label">Full House</div>
                    <div class="stat-value">-</div>
                </div>
            </div>
        </div>

        <!-- Bookings Tab -->
        <div id="bookings" class="tab-content">
            <div class="refresh-btn-container">
                <button class="btn-submit" onclick="loadBookings()" style="width: auto; grid-column: auto;">🔄 Refresh</button>
            </div>
            <div class="table-wrapper">
                <table id="bookingsTable">
                    <thead>
                        <tr>
                            <th>ID</th>
                            <th>Room</th>
                            <th>Check-in</th>
                            <th>Check-out</th>
                            <th>Duration</th>
                            <th>Action</th>
                        </tr>
                    </thead>
                    <tbody id="bookingsBody">
                    </tbody>
                </table>
                <div id="noBookings" class="no-data" style="display: none;">No bookings found</div>
            </div>
        </div>

        <!-- Add Booking Tab -->
        <div id="add" class="tab-content">
            <div class="form-group">
                <h2 style="margin-bottom: 20px;">Add Manual Booking</h2>
                <form id="addBookingForm" class="form-grid">
                    <div>
                        <label>Room</label>
                        <select id="addRoom" required>
                            <option value="">Select Room</option>
                            <option value="Sanyati">Sanyati ~ Executive Ensuite</option>
                            <option value="Pungwe">Pungwe ~ Standard Ensuite</option>
                            <option value="Odzi">Odzi ~ Shared Bathroom</option>
                            <option value="Gwayi">Gwayi ~ Shared Bathroom</option>
                            <option value="Self Catering">Self Catering ~ Garden Cottage</option>
                            <option value="Full House">Full House ~ All Four Rooms</option>
                        </select>
                    </div>
                    <div>
                        <label>Check-in Date</label>
                        <input type="date" id="addCheckIn" required>
                    </div>
                    <div>
                        <label>Check-out Date</label>
                        <input type="date" id="addCheckOut" required>
                    </div>
                    <div>
                        <label>Guest Name (Optional)</label>
                        <input type="text" id="addGuestName" placeholder="Guest name">
                    </div>
                    <div>
                        <label>Phone (Optional)</label>
                        <input type="tel" id="addPhone" placeholder="+263...">
                    </div>
                    <div>
                        <label>Source</label>
                        <select id="addSource">
                            <option value="WhatsApp">WhatsApp</option>
                            <option value="Phone">Phone Call</option>
                            <option value="Email">Email</option>
                            <option value="Walk-in">Walk-in</option>
                            <option value="Other">Other</option>
                        </select>
                    </div>
                    <button type="submit" class="btn-submit">➕ Add Booking</button>
                </form>
            </div>
        </div>
    </div>

    <script>
        const apiUrl = '/api/bookings';

        function switchTab(tabName) {
            document.querySelectorAll('.tab-content').forEach(el => el.classList.remove('active'));
            document.querySelectorAll('.tab-btn').forEach(el => el.classList.remove('active'));
            document.getElementById(tabName).classList.add('active');
            document.querySelector(`[onclick="switchTab('${tabName}')"]`).classList.add('active');
            
            if (tabName === 'dashboard' || tabName === 'bookings') {
                loadBookings();
            }
        }

        async function loadBookings() {
            try {
                const response = await fetch(apiUrl);
                const bookings = await response.json();
                
                if (!Array.isArray(bookings)) {
                    throw new Error('Invalid response');
                }

                updateStats(bookings);
                displayBookings(bookings);
            } catch (error) {
                showError('Failed to load bookings: ' + error.message);
            }
        }

        function updateStats(bookings) {
            const stats = {
                total: bookings.length,
                sanyati: bookings.filter(b => b.room_id === 'Sanyati').length,
                pungwe: bookings.filter(b => b.room_id === 'Pungwe').length,
                odzi: bookings.filter(b => b.room_id === 'Odzi').length,
                gwayi: bookings.filter(b => b.room_id === 'Gwayi').length,
                selfCatering: bookings.filter(b => b.room_id === 'Self Catering').length,
                fullHouse: bookings.filter(b => b.room_id === 'Full House').length
            };

            const statCards = document.querySelectorAll('.stat-value');
            statCards[0].textContent = stats.total;
            statCards[1].textContent = stats.sanyati;
            statCards[2].textContent = stats.pungwe;
            statCards[3].textContent = stats.odzi;
            statCards[4].textContent = stats.gwayi;
            statCards[5].textContent = stats.selfCatering;
            statCards[6].textContent = stats.fullHouse;
        }

        function displayBookings(bookings) {
            const tbody = document.getElementById('bookingsBody');
            tbody.innerHTML = '';

            if (bookings.length === 0) {
                document.getElementById('noBookings').style.display = 'block';
                document.getElementById('bookingsTable').style.display = 'none';
                return;
            }

            document.getElementById('bookingsTable').style.display = 'table';
            document.getElementById('noBookings').style.display = 'none';

            bookings.forEach(booking => {
                const checkIn = new Date(booking.check_in);
                const checkOut = new Date(booking.check_out);
                const duration = Math.ceil((checkOut - checkIn) / (1000 * 60 * 60 * 24));

                const row = document.createElement('tr');
                row.innerHTML = `
                    <td data-label="ID">#${booking.id}</td>
                    <td data-label="Room"><span class="room-badge">${booking.room_id}</span></td>
                    <td data-label="Check-in">${booking.check_in}</td>
                    <td data-label="Check-out">${booking.check_out}</td>
                    <td data-label="Duration">${duration} night${duration !== 1 ? 's' : ''}</td>
                    <td data-label="Action"><button class="btn-delete" onclick="deleteBooking(${booking.id})">Delete</button></td>
                `;
                tbody.appendChild(row);
            });
        }

        async function deleteBooking(id) {
            if (!confirm('Delete this booking?')) return;

            try {
                const response = await fetch(`${apiUrl}?id=${id}`, {
                    method: 'DELETE'
                });

                if (response.ok) {
                    showSuccess(`Booking #${id} deleted`);
                    loadBookings();
                } else {
                    showError('Failed to delete booking');
                }
            } catch (error) {
                showError('Error: ' + error.message);
            }
        }

        document.getElementById('addBookingForm').addEventListener('submit', async (e) => {
            e.preventDefault();

            const room = document.getElementById('addRoom').value;
            const checkIn = document.getElementById('addCheckIn').value;
            const checkOut = document.getElementById('addCheckOut').value;

            if (!room || !checkIn || !checkOut) {
                showError('Please fill in all required fields');
                return;
            }

            try {
                const response = await fetch('/api/create-booking', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        room_id: room,
                        check_in: checkIn,
                        check_out: checkOut
                    })
                });

                if (response.ok) {
                    showSuccess('Booking added successfully!');
                    document.getElementById('addBookingForm').reset();
                    loadBookings();
                    setTimeout(() => switchTab('bookings'), 500);
                } else {
                    const error = await response.json();
                    showError('Failed: ' + error.error);
                }
            } catch (error) {
                showError('Error: ' + error.message);
            }
        });

        function showSuccess(message) {
            const alert = document.getElementById('successAlert');
            alert.textContent = '✅ ' + message;
            alert.classList.add('success');
            setTimeout(() => alert.classList.remove('success'), 4000);
        }

        function showError(message) {
            const alert = document.getElementById('errorAlert');
            alert.textContent = '❌ ' + message;
            alert.classList.add('error');
            setTimeout(() => alert.classList.remove('error'), 4000);
        }

        // Load bookings on page load
        loadBookings();
    </script>
</body>
</html>
